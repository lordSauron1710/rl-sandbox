name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "codex/**"
  workflow_dispatch:
    inputs:
      run_comprehensive:
        description: "Run comprehensive backend acceptance tests"
        required: false
        default: false
        type: boolean
  schedule:
    - cron: "0 10 * * *"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20.19.0"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

  backend-smoke:
    name: Backend Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg swig

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Start backend
        run: |
          nohup uvicorn app.main:app --host 127.0.0.1 --port 8000 > /tmp/backend.log 2>&1 &
        working-directory: backend

      - name: Wait for backend health
        run: |
          for _ in $(seq 1 60); do
            if curl -sf http://127.0.0.1:8000/health > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "Backend failed to start"
          cat /tmp/backend.log
          exit 1

      - name: Run smoke tests
        env:
          API_BASE: http://127.0.0.1:8000/api/v1
          HEALTH_URL: http://127.0.0.1:8000/health
        run: bash test-smoke.sh

      - name: Print backend log on failure
        if: failure()
        run: cat /tmp/backend.log

  backend-comprehensive:
    name: Backend Comprehensive
    if: ${{ github.event_name == 'schedule' || github.ref == 'refs/heads/main' || (github.event_name == 'workflow_dispatch' && inputs.run_comprehensive) }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg swig

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Start backend
        run: |
          nohup uvicorn app.main:app --host 127.0.0.1 --port 8000 > /tmp/backend.log 2>&1 &
        working-directory: backend

      - name: Wait for backend health
        run: |
          for _ in $(seq 1 60); do
            if curl -sf http://127.0.0.1:8000/health > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "Backend failed to start"
          cat /tmp/backend.log
          exit 1

      - name: Run comprehensive tests
        env:
          API_BASE: http://127.0.0.1:8000/api/v1
          HEALTH_URL: http://127.0.0.1:8000/health
        run: bash test-comprehensive.sh

      - name: Print backend log on failure
        if: failure()
        run: cat /tmp/backend.log
