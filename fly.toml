# Fly.io deployment config for RL Gym Visualizer backend.
# Replace `app` with your unique Fly app name before first deploy.
app = "rl-sandbox-backend"
primary_region = "ord"

[build]
  dockerfile = "backend/Dockerfile"

[env]
  HOST = "0.0.0.0"
  PORT = "8000"
  RLV_DB_PATH = "/data/rl_visualizer.db"
  RLV_RUNS_DIR = "/data/runs"

[mounts]
  source = "rl_data"
  destination = "/data"

[http_service]
  internal_port = 8000
  force_https = true
  auto_start_machines = true
  auto_stop_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "20s"
    interval = "15s"
    method = "GET"
    path = "/health"
    timeout = "5s"
