services:
  backend:
    build:
      context: ../..
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    environment:
      API_DOMAIN: ${API_DOMAIN:?Set API_DOMAIN in deploy/selfhosted/backend.env}
      APP_ENV: ${APP_ENV:-production}
      ENABLE_API_DOCS: ${ENABLE_API_DOCS:-false}
      FRONTEND_URL: ${FRONTEND_URL:?Set FRONTEND_URL in deploy/selfhosted/backend.env}
      CORS_ORIGINS: ${CORS_ORIGINS:?Set CORS_ORIGINS in deploy/selfhosted/backend.env}
      CORS_ORIGIN_REGEX: ${CORS_ORIGIN_REGEX:-}
      TRUSTED_HOSTS: ${TRUSTED_HOSTS:?Set TRUSTED_HOSTS in deploy/selfhosted/backend.env}
      RLV_ACCESS_TOKEN: ${RLV_ACCESS_TOKEN:-}
      RLV_DB_PATH: /data/rl_visualizer.db
      RLV_RUNS_DIR: /data/runs
    expose:
      - "8000"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import os, urllib.request; host = os.environ['API_DOMAIN']; request = urllib.request.Request('http://127.0.0.1:8000/health', headers={'Host': host}); urllib.request.urlopen(request, timeout=5).read()"
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    volumes:
      - rl_sandbox_data:/data

  caddy:
    image: caddy:2.10-alpine
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      API_DOMAIN: ${API_DOMAIN:?Set API_DOMAIN in deploy/selfhosted/backend.env}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  rl_sandbox_data:
  caddy_data:
  caddy_config:
